<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ScreenshotSafe Settings</title>
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: #eef1f6;
            --panel-bg: #ffffff;
            --field-bg: #f8f9fc;
            --secondary-bg: #f4f6fb;
            --secondary-hover: #e9edf7;
            --text: #191b25;
            --muted: #626778;
            --label: #6a7080;
            --border-subtle: rgba(25,27,37,0.12);
            --border-strong: rgba(25,27,37,0.18);
            --shadow: 0 24px 80px rgba(28,36,58,0.18);
            --primary: #4f56e8;
            --primary-hover: #3f46d0;
            --focus: rgba(79,86,232,0.18);
            --notice-bg: rgba(199,118,0,0.09);
            --notice-border: rgba(199,118,0,0.28);
            --notice-text: #8a5600;
            --ok: #087d4a;
            --bad: #d92d4b;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #0f0f13;
                --panel-bg: #14141d;
                --field-bg: #0f0f13;
                --secondary-bg: #1a1a24;
                --secondary-hover: #22223a;
                --text: #e8e8f0;
                --muted: #aaa;
                --label: #888;
                --border-subtle: rgba(255,255,255,0.08);
                --border-strong: rgba(255,255,255,0.1);
                --shadow: 0 24px 80px rgba(0,0,0,0.35);
                --primary: #6a6aff;
                --primary-hover: #8484ff;
                --focus: rgba(106,106,255,0.16);
                --notice-bg: rgba(255,199,95,0.1);
                --notice-border: rgba(255,199,95,0.35);
                --notice-text: #ffd68a;
                --ok: #66e0a3;
                --bad: #ff6b83;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--page-bg);
            color: var(--text);
        }
        main {
            width: min(520px, 100%);
            padding: 22px;
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            background: var(--panel-bg);
            box-shadow: var(--shadow);
        }
        h1 {
            font-size: 18px;
            font-weight: 650;
            margin-bottom: 6px;
        }
        .subhead {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
            margin-bottom: 20px;
        }
        .notice {
            display: none;
            margin-bottom: 16px;
            padding: 10px 12px;
            border: 1px solid var(--notice-border);
            border-radius: 8px;
            background: var(--notice-bg);
            color: var(--notice-text);
            font-size: 13px;
            line-height: 1.4;
        }
        .notice.show { display: block; }
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--label);
            font-size: 11px;
            font-weight: 650;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            background: var(--field-bg);
            color: var(--text);
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--focus);
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-top: 18px;
        }
        button {
            min-height: 40px;
            padding: 10px 14px;
            border: 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            transition: 0.15s ease;
        }
        .primary {
            background: var(--primary);
            color: #fff;
        }
        .primary:hover { background: var(--primary-hover); }
        .secondary {
            background: var(--secondary-bg);
            border: 1px solid var(--border-strong);
            color: var(--text);
        }
        .secondary:hover {
            background: var(--secondary-hover);
            border-color: var(--border-strong);
        }
        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .status {
            min-height: 20px;
            margin-top: 14px;
            font-size: 13px;
            line-height: 1.4;
            color: var(--muted);
        }
        .status.ok { color: var(--ok); }
        .status.bad { color: var(--bad); }
    </style>
</head>
<body>
    <main>
        <h1>ScreenshotSafe Settings</h1>
        <p class="subhead">Tell the extension where your ScreenshotSafe server lives. It will use your browser sign-in for uploads.</p>
        <div class="notice" id="notice"></div>

        <div class="form-group">
            <label for="server-url">ScreenshotSafe Server</label>
            <input type="text" id="server-url" placeholder="screenshots.example.com">
        </div>

        <div class="actions">
            <button class="primary" id="save-btn" type="button">Save and Check</button>
            <button class="secondary" id="close-btn" type="button">Close</button>
        </div>

        <div class="status" id="status"></div>
    </main>

    <script src="webext-api.js"></script>
    <script src="options.js"></script>
</body>
</html>
