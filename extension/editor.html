<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ScreenshotSafe Editor</title>
    <script src="webext-api.js"></script>
    <script src="theme.js"></script>
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: #f7f8fb;
            --workspace-bg: #eef1f6;
            --canvas-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --control-bg: #f8f9fc;
            --control-hover: #eef1f8;
            --text: #191b25;
            --muted: #626778;
            --label: #6a7080;
            --border-subtle: rgba(25,27,37,0.12);
            --border-strong: rgba(25,27,37,0.18);
            --canvas-border: rgba(25,27,37,0.18);
            --shadow: 0 24px 80px rgba(28,36,58,0.18);
            --primary: #4f56e8;
            --primary-hover: #3f46d0;
            --primary-soft: rgba(79,86,232,0.13);
            --primary-border: rgba(79,86,232,0.25);
            --danger: #d92d4b;
            --danger-bg: rgba(217,45,75,0.08);
            --danger-border: rgba(217,45,75,0.24);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #0f0f13;
                --workspace-bg: #08080b;
                --canvas-bg: #050507;
                --sidebar-bg: #121219;
                --control-bg: #1a1a24;
                --control-hover: #22223a;
                --text: #e8e8f0;
                --muted: #aaa;
                --label: #888;
                --border-subtle: rgba(255,255,255,0.08);
                --border-strong: rgba(255,255,255,0.1);
                --canvas-border: rgba(255,255,255,0.14);
                --shadow: 0 24px 80px rgba(0,0,0,0.45);
                --primary: #6a6aff;
                --primary-hover: #8484ff;
                --primary-soft: rgba(106,106,255,0.18);
                --primary-border: rgba(106,106,255,0.22);
                --danger: #ff6b83;
                --danger-bg: rgba(255,77,106,0.1);
                --danger-border: rgba(255,77,106,0.3);
            }
        }
        :root[data-theme="light"] {
            color-scheme: light;
            --page-bg: #f7f8fb;
            --workspace-bg: #eef1f6;
            --canvas-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --control-bg: #f8f9fc;
            --control-hover: #eef1f8;
            --text: #191b25;
            --muted: #626778;
            --label: #6a7080;
            --border-subtle: rgba(25,27,37,0.12);
            --border-strong: rgba(25,27,37,0.18);
            --canvas-border: rgba(25,27,37,0.18);
            --shadow: 0 24px 80px rgba(28,36,58,0.18);
            --primary: #4f56e8;
            --primary-hover: #3f46d0;
            --primary-soft: rgba(79,86,232,0.13);
            --primary-border: rgba(79,86,232,0.25);
            --danger: #d92d4b;
            --danger-bg: rgba(217,45,75,0.08);
            --danger-border: rgba(217,45,75,0.24);
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
            --page-bg: #0f0f13;
            --workspace-bg: #08080b;
            --canvas-bg: #050507;
            --sidebar-bg: #121219;
            --control-bg: #1a1a24;
            --control-hover: #22223a;
            --text: #e8e8f0;
            --muted: #aaa;
            --label: #888;
            --border-subtle: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.1);
            --canvas-border: rgba(255,255,255,0.14);
            --shadow: 0 24px 80px rgba(0,0,0,0.45);
            --primary: #6a6aff;
            --primary-hover: #8484ff;
            --primary-soft: rgba(106,106,255,0.18);
            --primary-border: rgba(106,106,255,0.22);
            --danger: #ff6b83;
            --danger-bg: rgba(255,77,106,0.1);
            --danger-border: rgba(255,77,106,0.3);
        }
        :root[data-theme-loading="true"] body { visibility: hidden; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--page-bg);
            color: var(--text);
            overflow: hidden;
        }
        .app {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            height: 100vh;
        }
        .workspace {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            min-width: 0;
            padding: 24px;
            gap: 16px;
            background: var(--workspace-bg);
        }
        .canvas-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            min-height: 0;
            overflow: auto;
        }
        #edit-canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            border: 1px solid var(--canvas-border);
            border-radius: 8px;
            background: var(--canvas-bg);
            cursor: crosshair;
            box-shadow: var(--shadow);
        }
        #edit-canvas.locked { cursor: default; }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-left: 1px solid var(--border-subtle);
            padding: 18px;
            background: var(--sidebar-bg);
            overflow: auto;
        }
        .header {
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 650;
        }
        .metadata {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .label {
            color: var(--label);
            font-size: 11px;
            font-weight: 650;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .btn,
        .tool-btn,
        .copy-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            padding: 9px 12px;
            border: 0;
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 650;
            cursor: pointer;
            transition: 0.15s ease;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .btn-outline,
        .tool-btn,
        .copy-btn {
            background: var(--control-bg);
            border: 1px solid var(--border-strong);
        }
        .btn-outline:hover,
        .tool-btn:hover,
        .copy-btn:hover {
            background: var(--control-hover);
            border-color: var(--border-strong);
        }
        .tool-btn.active {
            border-color: var(--primary);
            background: var(--primary-soft);
        }
        .btn:disabled,
        .tool-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .btn:disabled:hover,
        .tool-btn:disabled:hover {
            background: var(--control-bg);
            border-color: var(--border-strong);
        }
        .hint {
            min-height: 34px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }
        .error {
            display: none;
            padding: 10px 12px;
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            border-radius: 8px;
            color: var(--danger);
            font-size: 12px;
            line-height: 1.4;
        }
        .error.show { display: block; }
        .result {
            display: none;
            padding: 12px;
            border: 1px solid var(--primary-border);
            border-radius: 8px;
            background: var(--primary-soft);
        }
        .result.show { display: block; }
        .result-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px;
            margin-top: 6px;
            margin-bottom: 10px;
        }
        .result-row input {
            min-width: 0;
            padding: 7px 8px;
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            background: var(--control-bg);
            color: var(--text);
            font: 12px 'SF Mono', Monaco, monospace;
        }
        .field {
            width: 100%;
            min-height: 36px;
            padding: 8px 10px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            background: var(--control-bg);
            color: var(--text);
            font-size: 13px;
            text-align: left;
        }
        .field:focus {
            outline: none;
            border-color: var(--primary);
        }
        .field-mono {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
        }
        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #pre-upload-controls .btn {
            width: 100%;
        }
        .copy-btn {
            min-height: 32px;
            padding: 7px 10px;
            font-size: 12px;
        }
        select {
            width: 100%;
            min-height: 36px;
            padding: 8px 10px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            background: var(--control-bg);
            color: var(--text);
            font-size: 13px;
        }
        select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .spacer { flex: 1; }
        .is-hidden { display: none !important; }
        @media (max-width: 840px) {
            body { overflow: auto; }
            .app {
                display: flex;
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .workspace {
                min-height: 58vh;
                padding: 12px;
            }
            .sidebar {
                border-left: 0;
                border-top: 1px solid var(--border-subtle);
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="workspace">
            <div class="metadata" id="metadata-controls">
                <div class="section">
                    <label class="label" for="page-title">Page Title</label>
                    <input class="field" type="text" id="page-title" autocomplete="off">
                </div>
                <div class="section">
                    <label class="label" for="image-url">Image URL</label>
                    <input class="field field-mono" type="url" id="image-url" autocomplete="off">
                </div>
            </div>

            <div class="canvas-wrap">
                <canvas id="edit-canvas"></canvas>
            </div>
        </section>

        <aside class="sidebar">
            <div class="header">
                <h1>ScreenshotSafe</h1>
            </div>

            <div id="pre-upload-controls">
                <button class="btn btn-outline" id="discard-btn" type="button">Discard Screenshot</button>
            </div>

            <div class="section" id="edit-controls">
                <div class="label">Tools</div>
                <div class="tool-grid">
                    <button class="tool-btn active" id="crop-tool-btn" type="button">Crop</button>
                    <button class="tool-btn" id="redact-tool-btn" type="button">Blackout</button>
                </div>
                <div class="tool-grid">
                    <button class="btn btn-outline" id="undo-edit-btn" type="button">Undo</button>
                    <button class="btn btn-outline" id="reset-edit-btn" type="button">Reset</button>
                </div>
                <div class="hint" id="editor-hint">Drag to set the crop area.</div>
            </div>

            <div class="section" id="upload-controls">
                <label class="label" for="expires-in">Expires</label>
                <select id="expires-in">
                    <option value="">Server default</option>
                    <option value="never">Never</option>
                    <option value="1h">In 1 hour</option>
                    <option value="24h">In 24 hours</option>
                    <option value="7d">In 7 days</option>
                    <option value="30d">In 30 days</option>
                </select>
                <button class="btn btn-primary" id="upload-btn" type="button">Finalize and Upload</button>
            </div>

            <div class="error" id="error-msg"></div>

            <div class="spacer"></div>
        </aside>
    </main>

    <script src="editor.js"></script>
</body>
</html>
