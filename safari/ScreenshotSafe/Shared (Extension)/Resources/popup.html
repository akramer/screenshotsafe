<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 340px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f13;
            color: #e8e8f0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 {
            font-size: 15px;
            font-weight: 600;
        }
        .header .icon { font-size: 20px; }
        .settings { margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 8px 10px;
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #e8e8f0;
            font-size: 13px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6a6aff;
            box-shadow: 0 0 0 2px rgba(106,106,255,0.15);
        }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4d6a;
        }
        .status-dot.connected { background: #00cc66; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary {
            background: #6a6aff;
            color: #fff;
        }
        .btn-primary:hover { background: #8484ff; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: #e8e8f0;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }
        .btn + .btn { margin-top: 8px; }
        .error {
            display: none;
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(255,77,106,0.1);
            border: 1px solid rgba(255,77,106,0.3);
            border-radius: 6px;
            font-size: 12px;
            color: #ff4d6a;
        }
        .error.show { display: block; }
        .saved-toast {
            display: none;
            position: fixed;
            top: 8px;
            right: 8px;
            padding: 6px 12px;
            background: rgba(0,204,102,0.9);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        .saved-toast.show {
            display: block;
            animation: fadeInOut 2s ease-in-out;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-8px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="icon">📸</span>
        <h1>ScreenshotSafe</h1>
    </div>

    <div class="settings">
        <div class="form-group">
            <label for="server-url">Server URL</label>
            <input type="text" id="server-url" placeholder="https://screenshots.example.com">
        </div>
        <div class="form-group">
            <label for="api-token">API Token</label>
            <input type="password" id="api-token" placeholder="sss_...">
        </div>
        <button class="btn btn-outline" id="save-settings-btn">Save Settings</button>
    </div>

    <div class="status" id="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Not configured</span>
    </div>

    <button class="btn btn-primary" id="capture-btn" disabled>
        📷 Capture and Edit
    </button>

    <div class="error" id="error-msg"></div>
    <div class="saved-toast" id="saved-toast">Settings saved ✓</div>

    <script src="webext-api.js"></script>
    <script src="popup.js"></script>
</body>
</html>
