<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f13;
            color: #e8e8f0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 {
            font-size: 15px;
            font-weight: 600;
        }
        .header .icon { font-size: 20px; }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4d6a;
        }
        .status-dot.connected { background: #00cc66; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 38px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary {
            background: #6a6aff;
            color: #fff;
        }
        .btn-primary:hover { background: #8484ff; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: #e8e8f0;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }
        .btn + .btn { margin-top: 8px; }
        .error {
            display: none;
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(255,77,106,0.1);
            border: 1px solid rgba(255,77,106,0.3);
            border-radius: 6px;
            font-size: 12px;
            color: #ff4d6a;
            line-height: 1.4;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <span class="icon">📸</span>
        <h1>ScreenshotSafe</h1>
    </div>

    <div class="status" id="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Checking settings...</span>
    </div>

    <button class="btn btn-primary" id="capture-btn" disabled>📷 Capture and Edit</button>
    <button class="btn btn-outline" id="settings-btn" type="button">Settings</button>

    <div class="error" id="error-msg"></div>

    <script src="webext-api.js"></script>
    <script src="popup.js"></script>
</body>
</html>
