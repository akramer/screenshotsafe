<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="webext-api.js"></script>
    <script src="theme.js"></script>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f7f8fb;
            --text: #191b25;
            --muted: #646879;
            --border-subtle: rgba(25,27,37,0.12);
            --border-strong: rgba(25,27,37,0.18);
            --outline-hover: rgba(25,27,37,0.06);
            --primary: #4f56e8;
            --primary-hover: #3f46d0;
            --danger: #d92d4b;
            --danger-bg: rgba(217,45,75,0.08);
            --danger-border: rgba(217,45,75,0.24);
            --success: #0c9f5a;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f13;
                --text: #e8e8f0;
                --muted: #888;
                --border-subtle: rgba(255,255,255,0.08);
                --border-strong: rgba(255,255,255,0.12);
                --outline-hover: rgba(255,255,255,0.05);
                --primary: #6a6aff;
                --primary-hover: #8484ff;
                --danger: #ff4d6a;
                --danger-bg: rgba(255,77,106,0.1);
                --danger-border: rgba(255,77,106,0.3);
                --success: #00cc66;
            }
        }
        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #f7f8fb;
            --text: #191b25;
            --muted: #646879;
            --border-subtle: rgba(25,27,37,0.12);
            --border-strong: rgba(25,27,37,0.18);
            --outline-hover: rgba(25,27,37,0.06);
            --primary: #4f56e8;
            --primary-hover: #3f46d0;
            --danger: #d92d4b;
            --danger-bg: rgba(217,45,75,0.08);
            --danger-border: rgba(217,45,75,0.24);
            --success: #0c9f5a;
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0f0f13;
            --text: #e8e8f0;
            --muted: #888;
            --border-subtle: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.12);
            --outline-hover: rgba(255,255,255,0.05);
            --primary: #6a6aff;
            --primary-hover: #8484ff;
            --danger: #ff4d6a;
            --danger-bg: rgba(255,77,106,0.1);
            --danger-border: rgba(255,77,106,0.3);
            --success: #00cc66;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .header h1 {
            font-size: 15px;
            font-weight: 600;
        }
        .header .icon { font-size: 20px; }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }
        .status-dot.connected { background: var(--success); }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 38px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--outline-hover);
            border-color: var(--border-strong);
        }
        .btn + .btn { margin-top: 8px; }
        .error {
            display: none;
            margin-top: 8px;
            padding: 8px 10px;
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--danger);
            line-height: 1.4;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <span class="icon">📸</span>
        <h1>ScreenshotSafe</h1>
    </div>

    <div class="status" id="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Checking settings...</span>
    </div>

    <button class="btn btn-primary" id="capture-btn" disabled>📷 Capture and Edit</button>
    <button class="btn btn-outline" id="settings-btn" type="button">Settings</button>

    <div class="error" id="error-msg"></div>

    <script src="popup.js"></script>
</body>
</html>
